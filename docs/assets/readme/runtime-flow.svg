<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DataAgent runtime flow</title>
  <desc id="desc">Clients call the API runtime, which assembles context and runs Mastra tools behind data, memory, knowledge, and file boundaries.</desc>
  <defs>
    <filter id="shadow" x="-20" y="-20" width="1240" height="470" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #0F172A; }
      .body { font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .bodyLight { font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #CBD5E1; }
      .tiny { font: 800 10px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748B; letter-spacing: .08em; }
      .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
    </style>
  </defs>

  <rect width="1200" height="430" rx="30" fill="#F8FAFC"/>
  <text x="60" y="56" class="tiny">RUNTIME MAP</text>
  <text x="60" y="86" class="title" font-size="28">One agent endpoint. Governed tools behind it.</text>

  <g filter="url(#shadow)">
    <rect x="58" y="126" width="178" height="168" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="82" y="154" width="48" height="48" rx="14" fill="#DBEAFE"/>
    <path d="M96 179h20M106 169v20" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
    <text x="82" y="228" class="title">Clients</text>
    <text x="82" y="252" class="body">Web workbench</text>
    <text x="82" y="274" class="body">TUI and future apps</text>
  </g>

  <path d="M256 210h86" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M334 201l13 9-13 9" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="362" y="126" width="212" height="168" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="386" y="154" width="48" height="48" rx="14" fill="#DCFCE7"/>
    <path d="M398 178l9 9 18-21" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="386" y="228" class="title">API Runtime</text>
    <text x="386" y="252" class="body">AG-UI stream</text>
    <text x="386" y="274" class="body">identity, replay, REST</text>
  </g>

  <path d="M594 210h74" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M660 201l13 9-13 9" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="690" y="96" width="226" height="228" rx="26" fill="#111827"/>
    <rect x="718" y="126" width="52" height="52" rx="16" fill="#14B8A6"/>
    <path d="M733 153h22M744 142v22" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <text x="718" y="206" class="title" fill="#FFFFFF">Agent Runtime</text>
    <text x="718" y="232" class="bodyLight">Mastra ReAct loop</text>
    <text x="718" y="254" class="bodyLight">context compiler</text>
    <text x="718" y="276" class="bodyLight">policy tools</text>
    <rect x="718" y="294" width="150" height="18" rx="9" fill="#1F2937"/>
  </g>

  <path d="M936 210h54" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M982 201l13 9-13 9" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="1010" y="86" width="132" height="70" rx="18" fill="#FFFFFF" stroke="#BAE6FD"/>
    <text x="1030" y="116" class="title" font-size="15">Gateway</text>
    <text x="1030" y="138" class="mono">readonly SQL</text>

    <rect x="1010" y="178" width="132" height="70" rx="18" fill="#FFFFFF" stroke="#BBF7D0"/>
    <text x="1030" y="208" class="title" font-size="15">Knowledge</text>
    <text x="1030" y="230" class="mono">retrieval</text>

    <rect x="1010" y="270" width="132" height="70" rx="18" fill="#FFFFFF" stroke="#FED7AA"/>
    <text x="1030" y="300" class="title" font-size="15">Assets</text>
    <text x="1030" y="322" class="mono">files, outputs</text>
  </g>

  <rect x="300" y="340" width="660" height="44" rx="22" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="330" y="367" class="body">SQLite metadata stores sessions, runs, events, memory, resources, audit, and artifacts.</text>
</svg>
