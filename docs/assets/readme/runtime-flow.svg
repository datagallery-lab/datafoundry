<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DataAgent compatibility banner</title>
  <desc id="desc">A compatibility-first runtime diagram with custom pictograms for clients, protocols, tools, audit, models, memory, files, RAG, artifacts, and skills.</desc>
  <defs>
    <filter id="softShadow" x="-30" y="-30" width="1260" height="620" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-16" y="-16" width="1232" height="592" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="core" x1="390" y1="126" x2="810" y2="434" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.48" stop-color="#11215A"/>
      <stop offset="1" stop-color="#123C69"/>
    </linearGradient>
    <linearGradient id="glass" x1="442" y1="158" x2="756" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0.64"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="#CBD5E1" stroke-opacity="0.28" stroke-width="1"/>
    </pattern>
    <style>
      .tiny { font: 850 10px Avenir Next, Manrope, ui-sans-serif, system-ui, sans-serif; fill: #64748B; letter-spacing: .14em; }
      .coreTitle { font: 900 36px Avenir Next, Manrope, ui-sans-serif, system-ui, sans-serif; fill: #FFFFFF; }
      .coreText { font: 780 15px Avenir Next, Manrope, ui-sans-serif, system-ui, sans-serif; fill: #D8E7FF; }
      .label { font: 850 12px Avenir Next, Manrope, ui-sans-serif, system-ui, sans-serif; fill: #334155; letter-spacing: .04em; }
      .stroke { fill: none; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1200" height="560" rx="32" fill="#F8FAFC"/>
  <rect x="36" y="36" width="1128" height="488" rx="30" fill="url(#grid)"/>
  <rect x="36" y="36" width="1128" height="488" rx="30" fill="#F8FAFC" fill-opacity="0.86"/>
  <text x="60" y="68" class="tiny">COMPATIBILITY-FIRST RUNTIME</text>

  <g filter="url(#softShadow)">
    <rect x="382" y="116" width="436" height="320" rx="44" fill="url(#core)"/>
    <rect x="406" y="140" width="388" height="272" rx="34" stroke="url(#glass)" stroke-width="2" stroke-opacity="0.82"/>
    <path d="M468 244c64-64 194-86 284-16" stroke="#60A5FA" stroke-opacity="0.38" stroke-width="16" stroke-linecap="round"/>
    <path d="M458 328c86 58 206 56 286-8" stroke="#34D399" stroke-opacity="0.34" stroke-width="16" stroke-linecap="round"/>
    <circle cx="600" cy="278" r="78" fill="#0F766E" fill-opacity="0.22"/>
    <circle cx="600" cy="278" r="49" fill="#14B8A6"/>
