<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TUI screenshot slot</title>
  <desc id="desc">A placeholder for a future TUI screenshot or animation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow" x="40" y="30" width="1120" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.24"/>
    </filter>
    <style>
      .title { font: 900 34px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #FFFFFF; }
      .body { font: 650 17px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #CBD5E1; }
      .mono { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #A7F3D0; }
      .line { font: 650 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #D1FAE5; }
    </style>
  </defs>
  <rect width="1200" height="560" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="88" y="76" width="1024" height="408" rx="30" fill="#020617" stroke="#334155"/>
  </g>
  <rect x="88" y="76" width="1024" height="58" rx="30" fill="#111827"/>
  <circle cx="128" cy="105" r="8" fill="#F87171"/>
  <circle cx="154" cy="105" r="8" fill="#FBBF24"/>
  <circle cx="180" cy="105" r="8" fill="#34D399"/>
  <text x="130" y="180" class="line">$ dataagent --resume latest</text>
  <text x="130" y="220" class="line">agent: inspecting schema...</text>
  <text x="130" y="260" class="line">tool: run_sql_readonly completed</text>
  <text x="130" y="300" class="line">artifact: table-result.csv ready</text>
  <text x="620" y="250" class="title">TUI screenshot / GIF</text>
  <text x="620" y="288" class="body">Drop a terminal demo capture here.</text>
  <text x="620" y="324" class="mono">docs/assets/readme/tui-demo.gif</text>
  <rect x="620" y="356" width="250" height="16" rx="8" fill="#14B8A6"/>
  <rect x="620" y="384" width="170" height="16" rx="8" fill="#334155"/>
</svg>
