<svg width="1200" height="540" viewBox="0 0 1200 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DataAgent workbench hero</title>
  <desc id="desc">A stylized data-agent workbench showing a chat, trace timeline, SQL result, and artifact panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.48" stop-color="#EEF8F5"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <linearGradient id="heroPanel" x1="84" y1="70" x2="1116" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7FAFC"/>
    </linearGradient>
    <filter id="shadow" x="40" y="28" width="1120" height="470" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1F2937" flood-opacity="0.14"/>
    </filter>
    <style>
      .label { font: 600 16px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #111827; }
      .muted { font: 500 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748B; }
      .tiny { font: 700 10px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748B; letter-spacing: .08em; }
      .code { font: 500 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .white { fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1200" height="540" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="84" y="70" width="1032" height="400" rx="28" fill="url(#heroPanel)" stroke="#E2E8F0"/>
  </g>

  <rect x="84" y="70" width="1032" height="54" rx="28" fill="#111827"/>
  <circle cx="122" cy="97" r="7" fill="#F87171"/>
  <circle cx="146" cy="97" r="7" fill="#FBBF24"/>
  <circle cx="170" cy="97" r="7" fill="#34D399"/>
  <rect x="214" y="84" width="360" height="26" rx="13" fill="#1F2937"/>
  <text x="235" y="102" class="muted" fill="#CBD5E1">dataagent.local/workbench</text>

  <g transform="translate(116 150)">
    <rect width="250" height="286" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="24" y="36" class="tiny">ACTIVE CONTEXT</text>
    <rect x="24" y="58" width="202" height="44" rx="13" fill="#ECFDF5" stroke="#A7F3D0"/>
    <circle cx="48" cy="80" r="11" fill="#10B981"/>
    <path d="M43 80l4 4 8-9" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="70" y="77" class="label" font-size="14">Demo DuckDB</text>
    <text x="70" y="94" class="muted">orders table ready</text>

    <rect x="24" y="118" width="202" height="44" rx="13" fill="#EFF6FF" stroke="#BFDBFE"/>
    <circle cx="48" cy="140" r="11" fill="#3B82F6"/>
    <path d="M45 135h6v10h-6zM54 131h6v14h-6z" fill="#FFFFFF"/>
    <text x="70" y="137" class="label" font-size="14">Knowledge</text>
    <text x="70" y="154" class="muted">retrieval governed</text>

    <rect x="24" y="178" width="202" height="44" rx="13" fill="#FFF7ED" stroke="#FED7AA"/>
    <circle cx="48" cy="200" r="11" fill="#F97316"/>
    <path d="M43 197h10v7H43zM46 193h4v4h-4z" fill="#FFFFFF"/>
    <text x="70" y="197" class="label" font-size="14">Workspace</text>
    <text x="70" y="214" class="muted">session isolated</text>

    <rect x="24" y="244" width="96" height="18" rx="9" fill="#F1F5F9"/>
    <rect x="130" y="244" width="74" height="18" rx="9" fill="#F1F5F9"/>
  </g>

  <g transform="translate(392 150)">
    <rect width="420" height="286" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="26" y="36" class="tiny">AGENT CHAT</text>
    <rect x="26" y="58" width="278" height="52" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="46" y="83" class="label" font-size="15">Analyze GMV by channel</text>
    <text x="46" y="101" class="muted">Use the selected datasource only.</text>

    <rect x="116" y="128" width="278" height="58" rx="16" fill="#111827"/>
    <text x="140" y="154" class="white label" font-size="15">I will inspect schema first,</text>
    <text x="140" y="174" class="white label" font-size="15">then run bounded readonly SQL.</text>

    <g transform="translate(26 206)">
      <rect width="368" height="54" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
      <circle cx="28" cy="27" r="12" fill="#14B8A6"/>
      <path d="M23 27h10M28 22v10" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <text x="52" y="24" class="code">SELECT channel, SUM(gmv) ...</text>
      <text x="52" y="42" class="muted">guarded, audited, artifact-backed</text>
    </g>
  </g>

  <g transform="translate(838 150)">
    <rect width="246" height="286" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="24" y="36" class="tiny">TRACE AND OUTPUTS</text>

    <g transform="translate(24 58)">
      <circle cx="12" cy="12" r="12" fill="#10B981"/>
      <path d="M7 12l4 4 7-9" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="17" class="label" font-size="14">inspect_schema</text>
      <line x1="12" y1="27" x2="12" y2="52" stroke="#CBD5E1" stroke-width="2"/>
    </g>

    <g transform="translate(24 116)">
      <circle cx="12" cy="12" r="12" fill="#0EA5E9"/>
      <path d="M7 15h10M7 11h10M7 7h10" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
      <text x="34" y="17" class="label" font-size="14">run_sql_readonly</text>
      <line x1="12" y1="27" x2="12" y2="52" stroke="#CBD5E1" stroke-width="2"/>
    </g>

    <g transform="translate(24 174)">
      <circle cx="12" cy="12" r="12" fill="#F97316"/>
      <path d="M7 9h10v8H7zM9 7h6v2H9z" fill="#FFFFFF"/>
      <text x="34" y="17" class="label" font-size="14">artifact created</text>
    </g>

    <rect x="24" y="222" width="198" height="42" rx="13" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="42" y="237" width="44" height="8" rx="4" fill="#14B8A6"/>
    <rect x="96" y="237" width="78" height="8" rx="4" fill="#CBD5E1"/>
    <rect x="42" y="251" width="108" height="8" rx="4" fill="#CBD5E1"/>
  </g>
</svg>
