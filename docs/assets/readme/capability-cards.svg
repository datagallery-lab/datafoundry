<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DataAgent capabilities</title>
  <desc id="desc">Six capability cards for schema-first SQL, context governance, artifacts, knowledge, skills, and audit replay.</desc>
  <defs>
    <filter id="shadow" x="-20" y="-20" width="1240" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #0F172A; }
      .body { font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748B; }
      .tiny { font: 800 10px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748B; letter-spacing: .08em; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="30" fill="#FFFFFF"/>
  <text x="60" y="58" class="tiny">CORE CAPABILITIES</text>
  <text x="60" y="90" class="title" font-size="30">The data-agent pieces that matter.</text>

  <g filter="url(#shadow)">
    <g transform="translate(60 126)">
      <rect width="330" height="140" rx="22" fill="#F8FAFC" stroke="#E2E8F0"/>
      <rect x="24" y="24" width="48" height="48" rx="15" fill="#DBEAFE"/>
      <path d="M37 40h22M37 48h18M37 56h22" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
      <text x="92" y="48" class="title">Schema-first SQL</text>
      <text x="92" y="76" class="body">Inspect structure before SQL.</text>
      <text x="92" y="98" class="body">Run bounded read-only queries.</text>
    </g>

    <g transform="translate(435 126)">
      <rect width="330" height="140" rx="22" fill="#F8FAFC" stroke="#E2E8F0"/>
      <rect x="24" y="24" width="48" height="48" rx="15" fill="#DCFCE7"/>
      <path d="M48 31l13 6v10c0 9-7 15-13 19-6-4-13-10-13-19V37l13-6z" stroke="#16A34A" stroke-width="3" stroke-linejoin="round"/>
      <text x="92" y="48" class="title">Context governance</text>
      <text x="92" y="76" class="body">Memory, files, and tools</text>
      <text x="92" y="98" class="body">compile under one budget.</text>
    </g>

    <g transform="translate(810 126)">
      <rect width="330" height="140" rx="22" fill="#F8FAFC" stroke="#E2E8F0"/>
      <rect x="24" y="24" width="48" height="48" rx="15" fill="#FFEDD5"/>
      <path d="M35 59h27V43H49l-4-6H35v22z" stroke="#F97316" stroke-width="4" stroke-linejoin="round"/>
      <text x="92" y="48" class="title">File assets</text>
      <text x="92" y="76" class="body">Deduplicated blobs power</text>
      <text x="92" y="98" class="body">uploads, workspace, outputs.</text>
    </g>

    <g transform="translate(60 306)">
      <rect width="330" height="140" rx="22" fill="#F8FAFC" stroke="#E2E8F0"/>
      <rect x="24" y="24" width="48" height="48" rx="15" fill="#FCE7F3"/>
      <path d="M35 34h18a8 8 0 018 8v20H43a8 8 0 01-8-8V34z" stroke="#DB2777" stroke-width="4" stroke-linejoin="round"/>
      <text x="92" y="48" class="title">Knowledge retrieval</text>
      <text x="92" y="76" class="body">Documents become governed</text>
      <text x="92" y="98" class="body">context through local search.</text>
    </g>

    <g transform="translate(435 306)">
      <rect width="330" height="140" rx="22" fill="#F8FAFC" stroke="#E2E8F0"/>
      <rect x="24" y="24" width="48" height="48" rx="15" fill="#E0F2FE"/>
      <path d="M48 34v28M34 48h28" stroke="#0284C7" stroke-width="4" stroke-linecap="round"/>
      <circle cx="48" cy="48" r="19" stroke="#0284C7" stroke-width="4"/>
      <text x="92" y="48" class="title">Skills and tools</text>
      <text x="92" y="76" class="body">Selected skills materialize</text>
      <text x="92" y="98" class="body">under workspace tool policy.</text>
    </g>

    <g transform="translate(810 306)">
      <rect width="330" height="140" rx="22" fill="#F8FAFC" stroke="#E2E8F0"/>
      <rect x="24" y="24" width="48" height="48" rx="15" fill="#EDE9FE"/>
      <path d="M35 56c8 8 18 8 26 0M35 40c8-8 18-8 26 0M48 34v28" stroke="#7C3AED" stroke-width="4" stroke-linecap="round"/>
      <text x="92" y="48" class="title">Replay and audit</text>
      <text x="92" y="76" class="body">Events, audit logs, artifacts</text>
      <text x="92" y="98" class="body">persist as replayable records.</text>
    </g>
  </g>
</svg>
