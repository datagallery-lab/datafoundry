<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GUI screenshot slot</title>
  <desc id="desc">A placeholder for a future GUI screenshot or animation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <filter id="shadow" x="40" y="30" width="1120" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 900 34px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #0F172A; }
      .body { font: 650 17px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .mono { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #64748B; }
    </style>
  </defs>
  <rect width="1200" height="560" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="88" y="76" width="1024" height="408" rx="30" fill="#FFFFFF" stroke="#D7E5F6"/>
  </g>
  <rect x="88" y="76" width="1024" height="58" rx="30" fill="#0F172A"/>
  <circle cx="128" cy="105" r="8" fill="#F87171"/>
  <circle cx="154" cy="105" r="8" fill="#FBBF24"/>
  <circle cx="180" cy="105" r="8" fill="#34D399"/>
  <rect x="128" y="172" width="210" height="256" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="382" y="172" width="370" height="256" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="796" y="172" width="240" height="256" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="426" y="252" class="title">GUI screenshot / GIF</text>
  <text x="426" y="290" class="body">Drop a polished workbench capture here.</text>
  <text x="426" y="326" class="mono">docs/assets/readme/gui-demo.gif</text>
  <rect x="426" y="358" width="240" height="16" rx="8" fill="#14B8A6"/>
  <rect x="426" y="386" width="160" height="16" rx="8" fill="#CBD5E1"/>
</svg>
