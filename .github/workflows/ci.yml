name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  SKIP_POSTINSTALL_BUILD: "1"

jobs:
  build-and-web-tests:
    name: Build and Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript workspaces
        run: npm run build

      - name: Run Web tests
        run: npm run test:web

      - name: Build Web application
        run: npm run build:web

  core-smoke-tests:
    name: Core Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript workspaces
        run: npm run build

      - name: Generate built-in demo fixture
        env:
          SKIP_DTC_GROWTH_REGISTER: "1"
        run: node scripts/seed-dtc-growth-demo.mjs

      - name: Run authentication regression
        run: node scripts/smoke-auth.mjs

      - name: Run conversation memory regression
        run: node scripts/smoke-conversation-memory.mjs

      - name: Run configuration API regression
        run: node scripts/smoke-config-api.mjs

      - name: Run built-in DataLink lifecycle regression
        run: node scripts/smoke-builtin-datalink.mjs

      - name: Run DataLink stack configuration tests
        run: npm run test:datalink-stack

      - name: Run file and workspace regression
        run: node scripts/smoke-files.mjs

      - name: Run read-only SQL regression
        run: node scripts/smoke-sql-readonly.mjs

      - name: Run data gateway regression
        run: node scripts/smoke-data-gateway.mjs

      - name: Run AG-UI stream regression
        run: node scripts/smoke-agui-stream.mjs

      - name: Run evidence selection regression
        run: node scripts/test-evidence-selection.mjs

      - name: Run built-in DTC Growth regression
        run: node --test scripts/test-builtin-dtc-growth-datasource.mjs

  datalink:
    name: DataLink Service
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install DataLink dependencies
        run: uv sync --project services/datalink --locked

      - name: Lint DataLink
        run: npm run lint:datalink

      - name: Test DataLink
        run: npm run test:datalink

      - name: Build DataLink package
        run: npm run build:datalink

      - name: Smoke DataLink REST and MCP
        shell: bash
        run: |
          set -euo pipefail
          export DATALINK_CONFIG_PATH="$RUNNER_TEMP/datalink_config.json"
          export DATALINK_GRAPH_DB_PATH="$RUNNER_TEMP/datalink.db"
          uv run --project services/datalink datalink api --host 127.0.0.1 --port 8081 &
          rest_pid=$!
          uv run --project services/datalink datalink serve --host 127.0.0.1 --port 8080 --transport streamable-http --db "$DATALINK_GRAPH_DB_PATH" &
          mcp_pid=$!
          trap 'kill "$rest_pid" "$mcp_pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:8081/healthz && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8081/healthz
          for _ in $(seq 1 30); do
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8080/mcp || true)
            if [ "$status" != "000" ]; then break; fi
            sleep 1
          done
          test "$status" != "000"

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Check documentation links and secrets
        run: npm run smoke:docs

      - name: Build documentation in strict mode
        run: npm run docs:build
